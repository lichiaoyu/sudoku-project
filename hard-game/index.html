<!DOCTYPE html>
<html lang="en">
<head>

  <title>Sudoku Game - Hard (9x9)</title>
  <link rel="stylesheet" href="../assets/css/global.css" />

<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-logo">
        <a href="../" class="logo-link">
          <i data-lucide="grid-3x3"></i>
          Sudoku
        </a>
      </div>

      <ul class="navbar-menu">
        <li class="nav-item">
          <a href="../" class="nav-link">
            <i data-lucide="house"></i>
            <span>Home</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="../selection/" class="nav-link active">
            <i data-lucide="gamepad-2"></i>
            <span>Play</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="../rules/" class="nav-link">
            <i data-lucide="notepad-text"></i>
            <span>Rules</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="../high-scores/" class="nav-link">
            <i data-lucide="trophy"></i>
            <span>High Scores</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="../login/" class="nav-link">
            <i data-lucide="log-in"></i>
            <span>Login</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="../register/" class="nav-link">
            <i data-lucide="user-round-plus"></i>
            <span>Register</span>
          </a>
        </li>
      </ul>
    </div>
  </nav>

    <section class="game-section">
      <h1 class="page-title">Hard Mode (9×9)</h1>
      <p class="page-subtitle">

        <div class="timer-display">
          Time <span class="timer-value">12:34</span>
        </div>
        <a class="cta-button" href="../easy-game/">Switch to Easy</a>
        <a class="cta-button" href="../selection/">Back to Selection</a>
      </div>

      <div class="board board--9" aria-label="9 by 9 sudoku board">
        <!-- Row 1 -->
        <input class="cell fixed" value="8" readonly />
        <input class="cell" inputmode="numeric" pattern="[1-9]" maxlength="1" />
        <input class="cell" inputmode="numeric" pattern="[1-9]" maxlength="1" />
        <input class="cell" inputmode="numeric" pattern="[1-9]" maxlength="1" />
