<!-- easy-game/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sudoku Game - Easy (6x6)</title>

  <!-- Common CSS -->
  <link rel="stylesheet" href="../assets/css/global.css" />
  <!-- Page-specific CSS -->
  <link rel="stylesheet" href="./easy-game.css" />
</head>

<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-logo">
        <a href="../" class="logo-link">Sudoku</a>
      </div>

      <ul class="navbar-menu">
        <li class="nav-item">
          <a href="../" class="nav-link"><span>Home</span></a>
        </li>
        <li class="nav-item">
          <a href="../selection/" class="nav-link active"><span>Play</span></a>
        </li>
        <li class="nav-item">
          <a href="../rules/" class="nav-link"><span>Rules</span></a>
        </li>
        <li class="nav-item">
          <a href="../high-scores/" class="nav-link"><span>High Scores</span></a>
        </li>
        <li class="nav-item">
          <a href="../login/" class="nav-link"><span>Login</span></a>
        </li>
        <li class="nav-item">
          <a href="../register/" class="nav-link"><span>Register</span></a>
        </li>
      </ul>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="main-content">
    <section class="game-section">
      <h1 class="page-title">Easy Mode (6×6)</h1>
      <p class="page-subtitle">Static mock board. Inputs allow one digit (1–6).</p>

      <div class="game-controls">
        <div class="timer-display">
          Time <span class="timer-value">03:21</span>
        </div>
        <a class="cta-button" href="../hard-game/">Switch to Hard</a>
        <a class="cta-button" href="../selection/">Back to Selection</a>
      </div>

      <div class="board board--6" aria-label="6 by 6 sudoku board">
        <!-- Row 1 -->
        <input class="cell fixed" type="text" value="1" readonly />
        <input class="cell" type="text" inputmode="numeric" pattern="[1-6]" maxlength="1" />
        <input class="cell" type="text" inputmode="numeric" pattern="[1-6]" maxlength="1" />
        <input class="cell fixed" type="text" value="4" readonly />
        <input class="cell" type="text" inputmode="numeric" pattern="[1-6]" maxlength="1" />
        <input class="cell" type="text" inputmode="numeric" pattern="[1-6]" maxlength="1" />

        <!-- Row 2 -->
        <input class="cell" type="text" inputmode="numeric" pattern="[1-6]" maxlength="1" />
        <input class="cell fixed" type="text" value="6" readonly />
        <input class="cell" type="text" inputmode="numeric" pattern="[1-6]" maxlength="1" />
        <input class="cell" type="text" inputmode="numeric" pattern="[1-6]" maxlength="1" />
        <input class="cell fixed" type="text" value="2" readonly />
        <input class="cell" type="text" inputmode="numeric" pattern="[1-6]" maxlength="1" />

        <!-- Row 3 -->
        <input class="cell" type="text" inputmode="numeric" pattern="[1-6]" maxlength="1" />
        <input class="cell" type="text" inputmode="numeric" pattern="[1-6]" maxlength="1" />
        <input class="cell fixed" type="text" value="5" readonly />
        <input class="cell" type="text" inputmode="numeric" pattern="[1-6]" maxlength="1" />
        <input class="cell" type="text" inputmode="numeric" pattern="[1-6]" maxlength="1" />
        <input class="cell fixed" type="text" value="1" readonly />

        <!-- Row 4 -->
        <input class="cell fixed" type="text" value="3" readonly />
        <input class="cell" type="text" inputmode="numeric" pattern="[1-6]" maxlength="1" />
        <input class="cell" type="text" inputmode="numeric" pattern="[1-6]" maxlength="1" />
        <input class="cell fixed" type="text" value="6" readonly />
        <input class="cell" type="text" inputmode="numeric" pattern="[1-6]" maxlength="1" />
        <input class="cell" type="text" inputmode="numeric" pattern="[1-6]" maxlength="1" />

        <!-- Row 5 -->
        <input class="cell" type="text" inputmode="numeric" pattern="[1-6]" maxlength="1" />
        <input class="cell fixed" type="text" value="1" readonly />
        <input class="cell" type="text" inputmode="numeric" pattern="[1-6]" maxlength="1" />
        <input class="cell" type="text" inputmode="numeric" pattern="[1-6]" maxlength="1" />
        <input class="cell fixed" type="text" value="4" readonly />
        <input class="cell" type="text" inputmode="numeric" pattern="[1-6]" maxlength="1" />

        <!-- Row 6 -->
        <input class="cell" type="text" inputmode="numeric" pattern="[1-6]" maxlength="1" />
        <input class="cell" type="text" inputmode="numeric" pattern="[1-6]" maxlength="1" />
        <input class="cell fixed" type="text" value="2" readonly />
        <input class="cell" type="text" inputmode="numeric" pattern="[1-6]" maxlength="1" />
        <input class="cell" type="text" inputmode="numeric" pattern="[1-6]" maxlength="1" />
        <input class="cell fixed" type="text" value="5" readonly />
      </div>

      <div class="button-group">
        <a class="cta-button" href="../high-scores/">View High Scores</a>
        <a class="cta-button" href="../rules/">Read Rules</a>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 Sudoku Game. All rights reserved.</p>
  </footer>
</body>
</html>
