<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Mode - Garden Sudoku</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/global.css">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-container">
            <a href="../" class="logo-link"><i class="fas fa-seedling"></i> Garden Sudoku</a>
            <ul class="navbar-menu">
                <li><a href="../" class="nav-link"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="../selection/" class="nav-link active"><i class="fas fa-play"></i> Play</a></li>
                <li><a href="../rules/" class="nav-link"><i class="fas fa-book-open"></i> Rules</a></li>
                <li><a href="../high-scores/" class="nav-link"><i class="fas fa-trophy"></i> Scores</a></li>
                <li><a href="../login/" class="nav-link"><i class="fas fa-sign-in-alt"></i> Login</a></li>
                <li><a href="../register/" class="nav-link"><i class="fas fa-user-plus"></i> Register</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="selection-box" style="background: rgba(52, 211, 153, 0.05); padding: 40px; border-radius: 24px; border: 1px solid var(--line);">
            <div class="game-container" style="display: flex; flex-direction: column; align-items: center;">
                <h2 style="margin-bottom: 20px;">Easy Mode (6x6)</h2>
                
                <div class="game-stats" style="display: flex; gap: 15px; margin-bottom: 20px;">
                    <div class="stat-badge" style="background: var(--accent); color: white; padding: 8px 15px; border-radius: 12px; font-weight: 700;">
                        <i class="fas fa-clock"></i> Time 03:21
                    </div>
                    <a href="../selection/" class="cta-button" style="padding: 8px 15px; font-size: 0.8rem; background: white; color: var(--accent); border: 2px solid var(--accent);">Back</a>
                </div>

                <div class="sudoku-grid grid-6x6" style="grid-template-columns: repeat(6, 50px); grid-template-rows: repeat(6, 50px);">
                    
                    <input type="text" class="sudoku-cell" value="1" disabled>
                    <input type="text" class="sudoku-cell" maxlength="1">
                    <input type="text" class="sudoku-cell" maxlength="1">
                    <input type="text" class="sudoku-cell" value="4" disabled>
                    <input type="text" class="sudoku-cell" maxlength="1">
                    <input type="text" class="sudoku-cell" maxlength="1">

                    <input type="text" class="sudoku-cell" maxlength="1">
                    <input type="text" class="sudoku-cell" maxlength="1">
                    <input type="text" class="sudoku-cell" value="6" disabled>
                    <input type="text" class="sudoku-cell" maxlength="1">
                    <input type="text" class="sudoku-cell" value="2" disabled>
                    <input type="text" class="sudoku-cell" maxlength="1">

                    <input type="text" class="sudoku-cell" maxlength="1">
                    <input type="text" class="sudoku-cell" value="2" disabled>
                    <input type="text" class="sudoku-cell" maxlength="1">
                    <input type="text" class="sudoku-cell" maxlength="1">
                    <input type="text" class="sudoku-cell" maxlength="1">
                    <input type="text" class="sudoku-cell" maxlength="1">

                    <input type="text" class="sudoku-cell" maxlength="1">
                    <input type="text" class="sudoku-cell" maxlength="1">
                    <input type="text" class="sudoku-cell" maxlength="1">
                    <input type="text" class="sudoku-cell" maxlength="1">
                    <input type="text" class="sudoku-cell" maxlength="1">
                    <input type="text" class="sudoku-cell" maxlength="1">

                    <input type="text" class="sudoku-cell" maxlength="1">
                    <input type="text" class="sudoku-cell" maxlength="1">
                    <input type="text" class="sudoku-cell" maxlength="1">
                    <input type="text" class="sudoku-cell" maxlength="1">
                    <input type="text" class="sudoku-cell" maxlength="1">
                    <input type="text" class="sudoku-cell" maxlength="1">

                    <input type="text" class="sudoku-cell" maxlength="1">
                    <input type="text" class="sudoku-cell" maxlength="1">
                    <input type="text" class="sudoku-cell" maxlength="1">
                    <input type="text" class="sudoku-cell" maxlength="1">
                    <input type="text" class="sudoku-cell" maxlength="1">
                    <input type="text" class="sudoku-cell" maxlength="1">
                </div>

                <button class="cta-button" style="border:none; cursor:pointer; margin-top: 30px; padding: 15px 40px;">Check Solution</button>
            </div>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Garden Sudoku Game.</p>
    </footer>

</body>
</html>
