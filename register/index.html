<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Garden Sudoku</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../assets/css/global.css">
</head>
<body>

    <nav class="navbar">
        <div class="navbar-container">
            <a href="../" class="logo-link"><i class="fas fa-seedling"></i> Garden Sudoku</a>
            <ul class="navbar-menu">
                <li><a href="../" class="nav-link"><i class="fas fa-home"></i> Home</a></li>
                <li><a href="../selection/" class="nav-link"><i class="fas fa-play"></i> Play</a></li>
                <li><a href="../rules/" class="nav-link"><i class="fas fa-book-open"></i> Rules</a></li>
                <li><a href="../high-scores/" class="nav-link"><i class="fas fa-trophy"></i> Scores</a></li>
                <li><a href="../login/" class="nav-link"><i class="fas fa-sign-in-alt"></i> Login</a></li>
                <li><a href="../register/" class="nav-link active"><i class="fas fa-user-plus"></i> Register</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        <div class="selection-box" style="background: rgba(52, 211, 153, 0.05); padding: 40px; border-radius: 24px; border: 1px solid var(--line); max-width: 450px; margin: 0 auto;">
            <h1 class="page-title" style="text-align: center;"><i class="fas fa-user-plus"></i> Join the Garden</h1>
            
            <form action="#" style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
                <div class="input-group">
                    <label style="display: block; margin-bottom: 8px; font-weight: 700;"><i class="fas fa-user"></i> Username</label>
                    <input type="text" placeholder="Pick a username" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--line); background: rgba(255, 255, 255, 0.4); font-family: inherit;">
                </div>

                <div class="input-group">
                    <label style="display: block; margin-bottom: 8px; font-weight: 700;"><i class="fas fa-envelope"></i> Email</label>
                    <input type="email" placeholder="Enter your email" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--line); background: rgba(255, 255, 255, 0.4); font-family: inherit;">
                </div>

                <div class="input-group">
                    <label style="display: block; margin-bottom: 8px; font-weight: 700;"><i class="fas fa-lock"></i> Password</label>
                    <input type="password" placeholder="Create a password" style="width: 100%; padding: 12px; border-radius: 12px; border: 1px solid var(--line); background: rgba(255, 255, 255, 0.4); font-family: inherit;">
                </div>

                <button type="submit" class="cta-button" style="border: none; cursor: pointer; width: 100%; font-size: 1rem; margin-top: 10px;">Create Account</button>
            </form>

            <p style="text-align: center; margin-top: 20px; font-size: 0.9rem; opacity: 0.8;">
                Already have an account? <a href="../login/" style="color: var(--accent); font-weight: 700; text-decoration: none;">Login here</a>
            </p>
        </div>
    </main>

    <footer class="footer">
        <p>&copy; 2026 Garden Sudoku Game.</p>
    </footer>

</body>
</html>
