<!-- register/index.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sudoku Game - Register</title>

  <!-- Common CSS -->
  <link rel="stylesheet" href="../assets/css/global.css" />
  <!-- Page-specific CSS -->
  <link rel="stylesheet" href="./register.css" />
</head>

<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-logo">
        <a href="../" class="logo-link">Sudoku</a>
      </div>

      <ul class="navbar-menu">
        <li class="nav-item">
          <a href="../" class="nav-link"><span>Home</span></a>
        </li>
        <li class="nav-item">
          <a href="../selection/" class="nav-link"><span>Play</span></a>
        </li>
        <li class="nav-item">
          <a href="../rules/" class="nav-link"><span>Rules</span></a>
        </li>
        <li class="nav-item">
          <a href="../high-scores/" class="nav-link"><span>High Scores</span></a>
        </li>
        <li class="nav-item">
          <a href="../login/" class="nav-link"><span>Login</span></a>
        </li>
        <li class="nav-item">
          <a href="../register/" class="nav-link active"><span>Register</span></a>
        </li>
      </ul>
    </div>
  </nav>

  <main class="main-content">
    <section class="page-section">
      <h1 class="page-title">Register</h1>
      <p class="page-subtitle">Mock registration form (no functionality yet).</p>

      <div class="form-card">
        <form action="#" method="post">
          <div class="form-field">
            <label for="r-username">Username</label>
            <input
              id="r-username"
              name="username"
              type="text"
              autocomplete="username"
              placeholder="Choose a username"
              required
            />
          </div>

          <div class="form-field">
            <label for="r-password">Password</label>
            <input
              id="r-password"
              name="password"
              type="password"
              autocomplete="new-password"
              placeholder="Create a password"
              required
            />
          </div>

          <div class="form-field">
            <label for="r-password2">Verify Password</label>
            <input
              id="r-password2"
              name="password2"
              type="password"
              autocomplete="new-password"
              placeholder="Re-enter your password"
              required
            />
          </div>

          <button class="btn" type="submit">Submit</button>
        </form>
      </div>

      <div class="button-group">
        <a class="cta-button" href="../login/">Already have an account?</a>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2026 Sudoku Game. All rights reserved.</p>
  </footer>
</body>
</html>
