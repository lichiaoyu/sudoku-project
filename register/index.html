<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sudoku Game - Register</title>
  <link rel="stylesheet" href="../assets/css/global.css" />
  <script src="https://unpkg.com/lucide@latest"></script>
</head>

<body>
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-logo">
        <a href="../" class="logo-link">
          <i data-lucide="grid-3x3"></i>
          Sudoku
        </a>
      </div>

      <ul class="navbar-menu">
        <li class="nav-item">
          <a href="../" class="nav-link">
            <i data-lucide="house"></i>
            <span>Home</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="../selection/" class="nav-link">
            <i data-lucide="gamepad-2"></i>
            <span>Play</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="../rules/" class="nav-link">
            <i data-lucide="notepad-text"></i>
            <span>Rules</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="../high-scores/" class="nav-link">
            <i data-lucide="trophy"></i>
            <span>High Scores</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="../login/" class="nav-link">
            <i data-lucide="log-in"></i>
            <span>Login</span>
          </a>
        </li>
        <li class="nav-item">
          <a href="../register/" class="nav-link active">
            <i data-lucide="user-round-plus"></i>
            <span>Register</span>
          </a>
        </li>
      </ul>
    </div>
  </nav>

  <main class="main-content">
    <section class="page-section">
      <h1 class="page-title">Register</h1>
      <p class="page-subtitle">
        Mock registration form (no functionality yet).
      </p>

      <div class="form-card">
        <form>
          <div class="form-field">
            <label for="r-username">Username</label>
            <input id="r-username" name="username" type="text" placeholder="Choose a username" />
          </div>

          <div class="form-field">
            <label for="r-password">Password</label>
            <input id="r-password" name="password" type="password" placeholder="Create a password" />
          </div>

          <div class="form-field">
            <label for="r-password2">Verify Password</label>
            <input id="r-password2" name="password2" type="password" placeholder="Re-enter your password" />
          </div>

          <button class="btn" type="submit">Submit</button>
        </form>
      </div>

      <div class="button-group">
        <a class="cta-button" href="../login/">Already have an account?</a>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2024 Sudoku Game. All rights reserved.</p>
  </footer>

  <script>
    lucide.createIcons();
  </script>
</body>
</html>
