<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sudoku Game - Register</title>
  <link rel="stylesheet" href="../assets/css/global.css" />
</head>

<body>
  <nav class="navbar">
    <div class="navbar-container">
      <div class="navbar-logo">
        <a href="../" class="logo-link">Sudoku</a>
      </div>

      <ul class="navbar-menu">
        <li class="nav-item"><a href="../" class="nav-link">Home</a></li>
        <li class="nav-item"><a href="../selection/" class="nav-link">Play</a></li>
        <li class="nav-item"><a href="../rules/" class="nav-link">Rules</a></li>
        <li class="nav-item"><a href="../high-scores/" class="nav-link">High Scores</a></li>
        <li class="nav-item"><a href="../login/" class="nav-link">Login</a></li>
        <li class="nav-item"><a href="../register/" class="nav-link active">Register</a></li>
      </ul>
    </div>
  </nav>

  <main class="main-content">
    <section class="features">
      <h1 class="page-title">Register</h1>
      <p style="color: rgba(229,231,235,.72); margin-top: 0;">
        Mock registration form (no functionality yet).
      </p>

      <div class="form-card">
        <form>
          <div class="form-field">
            <label for="r-username">Username</label>
            <input id="r-username" name="username" type="text" placeholder="Choose a username" />
          </div>

          <div class="form-field">
            <label for="r-password">Password</label>
            <input id="r-password" name="password" type="password" placeholder="Create a password" />
          </div>

          <div class="form-field">
            <label for="r-password2">Verify Password</label>
            <input id="r-password2" name="password2" type="password" placeholder="Re-enter your password" />
          </div>

          <button class="btn" type="submit">Submit</button>
        </form>
      </div>

      <div style="margin-top:14px;">
        <a class="cta-button" href="../login/">Already have an account?</a>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>&copy; 2024 Sudoku Game. All rights reserved.</p>
  </footer>
</body>
</html>
